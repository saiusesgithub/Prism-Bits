<button class="glass-modal-trigger" type="button" data-modal-open>
  Open modal
</button>

<div class="glass-modal-overlay" data-modal hidden>
  <div
    class="glass-modal"
    role="dialog"
    aria-modal="true"
    aria-labelledby="glass-modal-title"
  >
    <h2 class="glass-modal__title" id="glass-modal-title">
      Enable notifications?
    </h2>
    <p class="glass-modal__body">
      We'll ping you when a new component lands. You can turn this off any time.
    </p>
    <div class="glass-modal__actions">
      <button
        class="glass-modal__button glass-modal__button--primary"
        type="button"
        data-modal-close
      >
        Enable
      </button>
      <button class="glass-modal__button" type="button" data-modal-close>
        Not now
      </button>
    </div>
  </div>
</div>
