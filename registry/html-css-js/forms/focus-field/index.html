<div class="focus-field">
  <label class="focus-field__label" for="focus-field-email"
    >Email address</label
  >
  <div class="focus-field__control">
    <input
      class="focus-field__input"
      id="focus-field-email"
      type="email"
      placeholder="you@example.com"
    />

    We only use this for release notes. No spam.
  </p>
</div>
